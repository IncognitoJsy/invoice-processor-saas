{% extends "base/layout.html" %}
{% block title %}Access Denied - GoZappify{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <span class="text-8xl font-bold bg-gradient-to-r from-amber-500 to-red-500 bg-clip-text text-transparent">403</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Access denied</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8 max-w-md mx-auto">
            You don't have permission to access this page. If you think this is a mistake, please contact support.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/dashboard" class="px-6 py-3 bg-gradient-to-r from-primary-600 to-purple-600 text-white font-semibold rounded-xl hover:shadow-lg transition">
                Go to Dashboard
            </a>
            <button onclick="history.back()" class="px-6 py-3 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-semibold rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
