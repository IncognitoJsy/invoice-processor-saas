<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Accepted</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-white rounded-2xl shadow-lg p-10">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Quote Accepted!</h1>
            <p class="text-gray-500">Thank you for accepting quote <strong>{{ quote.quote_number }}</strong>.</p>
            <p class="text-gray-500 mt-2">{{ quote.user.company_name or 'Your contractor' }} has been notified and will be in touch shortly.</p>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">Powered by GoZappify</p>
    </div>
</body>
</html>
