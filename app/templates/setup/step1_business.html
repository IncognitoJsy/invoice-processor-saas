{% extends "base/layout.html" %}

{% block title %}Step 1: Your Business - FluxOps{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12">
    <div class="max-w-xl mx-auto px-4 w-full">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
            <!-- Progress -->
            <div class="flex items-center justify-between mb-8">
                <span class="text-sm text-gray-500 dark:text-gray-400">Step 1 of 4</span>
                <div class="flex gap-2">
                    <div class="w-8 h-2 bg-primary-600 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                </div>
            </div>
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Tell us about your business</h1>
                <p class="text-gray-600 dark:text-gray-300">This helps us personalise your experience</p>
            </div>
            
            <!-- Form -->
            <form action="{{ url_for('setup.save_business') }}" method="POST" class="space-y-6">
                <div>
                    <label for="company_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Company Name
                    </label>
                    <input type="text" id="company_name" name="company_name" 
                           value="{{ current_user.company_name or '' }}"
                           placeholder="e.g., Smith Electrical Ltd"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            First Name
                        </label>
                        <input type="text" id="first_name" name="first_name" 
                               value="{{ current_user.first_name or '' }}"
                               placeholder="John"
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition">
                    </div>
                    <div>
                        <label for="last_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            Last Name
                        </label>
                        <input type="text" id="last_name" name="last_name" 
                               value="{{ current_user.last_name or '' }}"
                               placeholder="Smith"
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition">
                    </div>
                </div>
                
                <!-- Buttons -->
                <div class="flex justify-between pt-4">
                    <a href="{{ url_for('setup.index') }}" class="px-6 py-3 text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white font-medium transition">
                        ← Back
                    </a>
                    <button type="submit" class="px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl font-semibold transition shadow-lg shadow-primary-600/25">
                        Continue →
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
