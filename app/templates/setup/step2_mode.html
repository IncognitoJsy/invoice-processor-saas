{% extends "base/layout.html" %}
{% block title %}Step 2: How You Work - GoZappify{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12">
    <div class="max-w-xl mx-auto px-4 w-full">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
            <!-- Progress -->
            <div class="flex items-center justify-between mb-8">
                <span class="text-sm text-gray-500 dark:text-gray-400">Step 2 of 5</span>
                <div class="flex gap-2">
                    <div class="w-8 h-2 bg-primary-600 rounded-full"></div>
                    <div class="w-8 h-2 bg-primary-600 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                    <div class="w-8 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                </div>
            </div>
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">How do you manage your accounts?</h1>
                <p class="text-gray-600 dark:text-gray-300">This sets up GoZappify to work exactly the way you need it</p>
            </div>
            <!-- Mode choices -->
            <form action="{{ url_for('setup.save_mode') }}" method="POST" class="space-y-4">
                <div class="space-y-3 mb-6">
                    <!-- Sync mode -->
                    <label class="block cursor-pointer">
                        <input type="radio" name="platform_mode" value="sync" class="sr-only peer" {% if current_user.platform_mode == 'sync' or not current_user.platform_mode %}checked{% endif %}>
                        <div class="flex items-start gap-4 p-4 border-2 border-gray-200 dark:border-gray-600 peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20 rounded-xl transition">
                            <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                                <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <p class="font-semibold text-gray-900 dark:text-white">I use QuickBooks or Xero</p>
                                    <svg class="w-5 h-5 text-primary-600 dark:text-primary-400 opacity-0 peer-checked:opacity-100 hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                                    </svg>
                                </div>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Process supplier invoices and sync to your accounting software automatically.</p>
                            </div>
                        </div>
                    </label>
                    <!-- Full mode -->
                    <label class="block cursor-pointer">
                        <input type="radio" name="platform_mode" value="full" class="sr-only peer" {% if current_user.platform_mode == 'full' %}checked{% endif %}>
                        <div class="flex items-start gap-4 p-4 border-2 border-gray-200 dark:border-gray-600 peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20 rounded-xl transition">
                            <div class="w-10 h-10 rounded-xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                                <svg class="w-5 h-5 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <p class="font-semibold text-gray-900 dark:text-white">I don't use accounting software</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Use GoZappify for quoting, invoicing, and managing your whole business in one place.</p>
                            </div>
                        </div>
                    </label>
                    <!-- Both mode -->
                    <label class="block cursor-pointer">
                        <input type="radio" name="platform_mode" value="both" class="sr-only peer" {% if current_user.platform_mode == 'both' %}checked{% endif %}>
                        <div class="flex items-start gap-4 p-4 border-2 border-gray-200 dark:border-gray-600 peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20 rounded-xl transition">
                            <div class="w-10 h-10 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                                <svg class="w-5 h-5 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <p class="font-semibold text-gray-900 dark:text-white">Both — use GoZappify + accounting software</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Full invoicing in GoZappify with everything synced to QuickBooks or Xero automatically.</p>
                            </div>
                        </div>
                    </label>
                </div>
                <div class="flex justify-between pt-2">
                    <a href="{{ url_for('setup.step', step=1) }}" class="px-6 py-3 text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white font-medium transition">← Back</a>
                    <button type="submit" class="px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl font-semibold transition shadow-lg shadow-primary-600/25">Continue →</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
